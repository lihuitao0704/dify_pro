<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小留同学 · 学生智能助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:#f5f7fb;height:100vh;overflow:hidden}
.app{display:flex;height:100vh;max-width:1440px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,.08)}
.sidebar{width:280px;background:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;border-right:1px solid #eef0f5}
.main{flex:1;display:flex;flex-direction:column;background:#fafbfc}

.sidebar-header{background:linear-gradient(135deg,#4f6ef7,#6c8cff);padding:24px 20px;color:#fff}
.sidebar-header h2{font-size:20px;font-weight:600}
.sidebar-header .sub{font-size:12px;opacity:.8;margin-top:4px}

.student-card{margin:16px;padding:16px;background:linear-gradient(135deg,#f0f4ff,#e8eeff);border-radius:12px}
.student-card .name{font-size:16px;font-weight:600;color:#1a1a2e}
.student-card .info{font-size:12px;color:#666;margin-top:4px}
.student-card .logout-btn{display:inline-block;margin-top:10px;padding:4px 16px;font-size:11px;color:#999;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;transition:all .2s}
.student-card .logout-btn:hover{color:#e74c3c;border-color:#e74c3c}

.info-panel{margin:0 16px 12px;padding:14px;background:#f8f9fc;border-radius:10px}
.info-panel h4{font-size:11px;color:#999;margin-bottom:8px;letter-spacing:1px}
.emotion-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;margin:2px;font-weight:500}
.emotion-low{background:#eaf7ea;color:#2d8a2d}
.emotion-medium{background:#fff3e6;color:#cc6d00}
.emotion-high{background:#ffeaea;color:#d33030}
.intent-tag{display:inline-block;padding:3px 10px;background:#eef2ff;color:#4f6ef7;border-radius:20px;font-size:11px;margin:2px}
.quick-actions{margin:0 16px 16px}
.quick-actions h4{font-size:11px;color:#999;margin-bottom:10px;letter-spacing:1px}
.quick-btn{display:flex;align-items:center;gap:8px;width:100%;padding:11px 14px;margin-bottom:6px;border:1px solid #eef0f5;border-radius:10px;background:#fff;text-align:left;font-size:13px;cursor:pointer;transition:all .2s;color:#333}
.quick-btn:hover{background:#f5f7ff;border-color:#c8d4ff;transform:translateX(2px)}
.quick-btn .icon{font-size:16px;width:24px;text-align:center}

.chat-header{padding:16px 28px;background:#fff;border-bottom:1px solid #eef0f5;display:flex;align-items:center;justify-content:space-between}
.chat-header .title{font-size:16px;font-weight:600;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.chat-header .title .dot{width:8px;height:8px;border-radius:50%;background:#2ecc71}
.chat-header .sid{font-size:11px;color:#bbb;font-family:monospace}
.chat-messages{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;gap:18px;background:#fafbfc}
.chat-messages::-webkit-scrollbar{width:5px}
.chat-messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:10px}
.message{display:flex;gap:12px;max-width:75%;animation:fadeIn .35s ease}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message.assistant{align-self:flex-start}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.avatar.bot{background:linear-gradient(135deg,#eef2ff,#dde4ff);box-shadow:0 2px 8px rgba(79,110,247,.15)}
.avatar.user{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);box-shadow:0 2px 8px rgba(46,204,113,.15)}
.bubble{padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.bubble.assistant{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04);border-bottom-left-radius:6px}
.bubble.user{background:linear-gradient(135deg,#4f6ef7,#6c8cff);color:#fff;border-bottom-right-radius:6px}
.bubble .time{font-size:10px;margin-top:6px;opacity:.6}
.chat-input{padding:18px 28px;background:#fff;border-top:1px solid #eef0f5}
.input-row{display:flex;gap:14px;align-items:flex-end}
.input-row textarea{flex:1;padding:12px 18px;border:1.5px solid #e8ecf1;border-radius:14px;font-size:14px;resize:none;outline:none;min-height:46px;max-height:120px;font-family:inherit;line-height:1.6;background:#f9fafb;transition:all .2s}
.input-row textarea:focus{border-color:#4f6ef7;background:#fff;box-shadow:0 0 0 3px rgba(79,110,247,.08)}
.send-btn{padding:12px 28px;background:linear-gradient(135deg,#4f6ef7,#6c8cff);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 12px rgba(79,110,247,.3)}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,110,247,.4)}
.send-btn:disabled{background:#d4d8e0;box-shadow:none;transform:none;cursor:not-allowed}
.typing-dots{display:flex;gap:5px;padding:4px 0}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:#bcc4d6;animation:typing 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c0c6d0}
.empty-state .icon{font-size:56px;margin-bottom:16px}
.empty-state p{font-size:18px;margin-bottom:6px;color:#888;font-weight:500}
.empty-state .hint{font-size:13px;color:#bbb}

.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#4f6ef7 0%,#6c8cff 50%,#8b9eff 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:20px;padding:44px 40px;width:400px;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.login-box .logo{text-align:center;font-size:48px;margin-bottom:8px}
.login-box h2{text-align:center;color:#1a1a2e;margin-bottom:4px;font-size:22px}
.login-box .sub{text-align:center;color:#999;font-size:13px;margin-bottom:28px}
.login-box label{font-size:13px;color:#555;display:block;margin-bottom:6px;font-weight:500}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid #e8ecf1;border-radius:12px;font-size:14px;margin-bottom:18px;outline:none;box-sizing:border-box;transition:all .2s;background:#f9fafb}
.login-box input:focus{border-color:#4f6ef7;background:#fff;box-shadow:0 0 0 3px rgba(79,110,247,.08)}
.login-box button{width:100%;padding:13px;background:linear-gradient(135deg,#4f6ef7,#6c8cff);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 4px 16px rgba(79,110,247,.3);transition:all .2s}
.login-box button:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(79,110,247,.4)}
.login-box .error{color:#e74c3c;font-size:12px;text-align:center;margin-top:10px}
.app.hidden{display:none}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
.modal-box{background:#fff;border-radius:18px;padding:30px;width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-box h3{margin-bottom:18px;font-size:18px;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.modal-box label{font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500}
.modal-box input,.modal-box select,.modal-box textarea{width:100%;padding:10px 14px;border:1.5px solid #e8ecf1;border-radius:10px;font-size:13px;margin-bottom:12px;outline:none;box-sizing:border-box;font-family:inherit;background:#f9fafb;transition:all .2s}
.modal-box input:focus,.modal-box select:focus,.modal-box textarea:focus{border-color:#4f6ef7;background:#fff;box-shadow:0 0 0 3px rgba(79,110,247,.06)}
.modal-box textarea{resize:none;height:60px}
.modal-box .btn-row{display:flex;gap:12px;justify-content:flex-end;margin-top:14px}
.modal-box .btn-cancel{background:#f2f3f5;color:#666;padding:9px 24px;border:none;border-radius:10px;font-size:13px;cursor:pointer;transition:all .2s}
.modal-box .btn-cancel:hover{background:#e4e6ea}
.modal-box .btn-submit{background:linear-gradient(135deg,#4f6ef7,#6c8cff);color:#fff;padding:9px 24px;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 3px 12px rgba(79,110,247,.25);transition:all .2s}
.modal-box .btn-submit:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(79,110,247,.35)}
.modal-box .btn-submit:disabled{background:#d4d8e0;box-shadow:none;transform:none}
.modal-box .hint{font-size:11px;color:#aaa;margin-top:-6px;margin-bottom:10px}

.reminder-item{padding:8px 0;border-bottom:1px solid #f2f3f5;font-size:12px;line-height:1.6}
.reminder-read{display:inline-block;margin-top:4px;padding:2px 12px;font-size:11px;color:#4f6ef7;border:1px solid #dde4ff;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s}
.reminder-read:hover{background:#f0f3ff;color:#3a56d4}
</style>
</head>
<body>

<div class="modal-overlay" id="leaveModal">
  <div class="modal-box">
    <h3>在线请假</h3>
    <label>请假类型 *</label>
    <select id="lvType"><option value="事假">事假</option><option value="病假">病假</option></select>
    <label>开始时间 *</label>
    <input type="datetime-local" id="lvStart">
    <label>结束时间 *</label>
    <input type="datetime-local" id="lvEnd">
    <label>请假原因 *</label>
    <textarea id="lvReason" placeholder="请简要说明请假原因"></textarea>
    <label>附件链接</label>
    <input type="text" id="lvAttach" placeholder="选填，如病假证明链接">
    <div class="hint">* 为必填项</div>
    <div class="btn-row">
      <button class="btn-cancel" type="button" id="lvCancel">取消</button>
      <button class="btn-submit" type="button" id="lvSubmit">提交申请</button>
    </div>
  </div>
</div>

<!-- 投诉弹窗 -->
<div class="modal-overlay" id="fbModal">
  <div class="modal-box">
    <h3>我要反馈</h3>
    <label>反馈类型 *</label>
    <select id="fbCat">
      <option value="生活服务">生活服务</option>
      <option value="签证办理">签证办理</option>
      <option value="院校申请">院校申请</option>
      <option value="教学质量">教学质量</option>
      <option value="其他">其他</option>
    </select>
    <label>标题 *</label>
    <input type="text" id="fbTitle" placeholder="简要概括你的问题">
    <label>详细描述 *</label>
    <textarea id="fbContent" placeholder="请详细描述你遇到的问题"></textarea>
    <label>紧急程度</label>
    <select id="fbUrgency"><option value="normal">普通</option><option value="urgent">紧急</option></select>
    <div class="hint">* 为必填项，提交后24小时内跟进处理</div>
    <div class="btn-row">
      <button class="btn-cancel" type="button" id="fbCancel">取消</button>
      <button class="btn-submit" type="button" id="fbSubmit">提交工单</button>
    </div>
  </div>
</div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="logo"></div>
    <h2>小留同学</h2>
    <div class="sub">已签约学生专属智能助手</div>
    <label>学号</label>
    <input type="text" id="loginId" placeholder="请输入学号，如 1001">
    <label>姓名</label>
    <input type="text" id="loginName" placeholder="请输入姓名，如 张三">
    <button type="button" id="loginBtn">登 录</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div class="app hidden" id="mainApp">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>小留同学</h2>
      <div class="sub">学生智能助手 v1.0</div>
    </div>
    <div class="student-card">
      <div class="name" id="stuName">-</div>
      <div class="info">学号：<span id="stuId">-</span></div>
      <button class="logout-btn" type="button" id="logoutBtn">退出登录</button>
    </div>
    <div class="info-panel">
      <h4>当前情绪</h4>
      <div id="emoPanel" style="color:#999;font-size:12px">等待对话...</div>
    </div>
    <div class="info-panel">
      <h4>识别意图</h4>
      <div id="intPanel" style="color:#999;font-size:12px">等待对话...</div>
    </div>
    <div class="info-panel" id="remPanel" style="display:none">
      <h4>待处理提醒</h4>
      <div id="remList"></div>
    </div>
    <div class="info-panel" id="myPanel" style="display:none">
      <h4>我的</h4>
      <div id="myList" style="font-size:12px;line-height:1.8"></div>
    </div>
    <div class="quick-actions">
      <h4>快捷入口</h4>
      <button class="quick-btn" type="button" id="btnLeave">📝 在线请假</button>
      <button class="quick-btn" type="button" id="btnDDL">📅 我的考试DDL</button>
      <button class="quick-btn" type="button" id="btnFeedback">💬 我要反馈/投诉</button>
      <button class="quick-btn" type="button" id="btnProgress">📊 申请进度</button>
      <button class="quick-btn" type="button" id="btnUpgrade">🎓 升学深造</button>
    </div>
  </aside>
  <div class="main">
    <div class="chat-header">
      <span class="title"><span class="dot"></span> 在线对话</span>
      <span class="sid" id="sessId">-</span>
    </div>
    <div class="chat-messages" id="chatBox">
      <div class="empty-state" id="emptyState">
        <div class="icon"></div>
        <p>你好，我是小留同学</p>
        <p class="hint">留学路上有什么需要帮忙的？直接告诉我就行</p>
      </div>
    </div>
    <div class="chat-input">
      <div class="input-row">
        <textarea id="userInput" placeholder="输入你的问题，按 Enter 发送..." rows="1"></textarea>
        <button class="send-btn" type="button" id="sendBtn">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
var sessId="", isBusy=false, student=null;

document.getElementById("loginBtn").addEventListener("click", async function(){
  var sid=document.getElementById("loginId").value.trim();
  var nm=document.getElementById("loginName").value.trim();
  if(!sid||!nm){document.getElementById("loginError").textContent="请输入学号和姓名";return;}
  try{
    var r=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({student_id:parseInt(sid),name:nm})});
    var d=await r.json();
    if(d.success){student=d.student;document.getElementById("loginOverlay").style.display="none";document.getElementById("mainApp").classList.remove("hidden");document.getElementById("stuName").textContent=d.student.name;document.getElementById("stuId").textContent=d.student.id;loadReminders();loadMyPanel();}
    else{document.getElementById("loginError").textContent=d.message||"学号或姓名不正确";}
  }catch(e){document.getElementById("loginError").textContent="服务暂不可用，请稍后重试";}
});
document.getElementById("loginName").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("loginBtn").click();});
document.getElementById("logoutBtn").addEventListener("click",function(){student=null;sessId="";document.getElementById("loginOverlay").style.display="flex";document.getElementById("mainApp").classList.add("hidden");});

// ====== 请假弹窗 ======
document.getElementById("btnLeave").addEventListener("click",function(){
  if(!student){alert("请先登录");return;}
  var d=new Date(), tz=d.getTime()-d.getTimezoneOffset()*60000;
  document.getElementById("lvStart").value=new Date(tz).toISOString().slice(0,16);
  document.getElementById("lvEnd").value=new Date(tz).toISOString().slice(0,16);
  document.getElementById("lvReason").value="";document.getElementById("lvAttach").value="";
  document.getElementById("leaveModal").style.display="flex";
});
document.getElementById("lvCancel").addEventListener("click",function(){document.getElementById("leaveModal").style.display="none";});
document.getElementById("lvSubmit").addEventListener("click",async function(){
  var tp=document.getElementById("lvType").value;
  var st=document.getElementById("lvStart").value.replace("T"," ");
  var ed=document.getElementById("lvEnd").value.replace("T"," ");
  var rs=document.getElementById("lvReason").value.trim();
  if(!st||!ed||!rs){alert("请填写类型、时间和原因");return;}
  if(!student){alert("请先登录");return;}
  var btn=document.getElementById("lvSubmit");btn.disabled=true;btn.textContent="提交中...";
  try{
    var body=JSON.stringify({student_id:student.id,leave_type:tp,start_time:st+":00",end_time:ed+":00",reason:rs});
    var r=await fetch("/leave/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:body});
    var txt=await r.text();btn.disabled=false;btn.textContent="提交申请";
    if(txt.indexOf("true")>0){document.getElementById("leaveModal").style.display="none";addMsg("assistant","请假申请已提交！\n\n类型："+tp+"\n时间："+st+" ~ "+ed+"\n原因："+rs+"\n\n等待班主任审批中，审批完成后会通知你。");}
    else{alert("提交失败，请重试");}
  }catch(e){btn.disabled=false;btn.textContent="提交申请";alert("网络异常，请重试");}
});

// ====== 投诉弹窗 ======
document.getElementById("btnFeedback").addEventListener("click",function(){
  if(!student){alert("请先登录");return;}
  document.getElementById("fbTitle").value="";document.getElementById("fbContent").value="";
  document.getElementById("fbModal").style.display="flex";
});
document.getElementById("fbCancel").addEventListener("click",function(){document.getElementById("fbModal").style.display="none";});
document.getElementById("fbSubmit").addEventListener("click",async function(){
  var cat=document.getElementById("fbCat").value;
  var title=document.getElementById("fbTitle").value.trim();
  var content=document.getElementById("fbContent").value.trim();
  var urg=document.getElementById("fbUrgency").value;
  if(!title||!content){alert("请填写标题和描述");return;}
  if(!student){alert("请先登录");return;}
  var btn=document.getElementById("fbSubmit");btn.disabled=true;btn.textContent="提交中...";
  try{
    var body=JSON.stringify({student_id:student.id,category:cat,title:title,content:content,urgency:urg});
    var r=await fetch("/feedback/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:body});
    var txt=await r.text();btn.disabled=false;btn.textContent="提交工单";
    if(txt.indexOf("true")>0){document.getElementById("fbModal").style.display="none";addMsg("assistant","工单已创建！\n\n类型："+cat+"\n标题："+title+"\n状态：处理中\n\n我们会在24小时内跟进处理。");}
    else{alert("提交失败，请重试");}
  }catch(e){btn.disabled=false;btn.textContent="提交工单";alert("网络异常，请重试");}
});

// ====== 提醒 ======
async function loadReminders(){
  if(!student)return;
  try{
    var r=await fetch("/reminders/"+student.id);var d=await r.json();
    var p=document.getElementById("remPanel");var l=document.getElementById("remList");
    if(d.count>0){p.style.display="block";var h="";d.reminders.forEach(function(x){h+="<div class=\"reminder-item\">"+esc(x.message).replace(/\n/g,"<br>")+"<br><span class=\"reminder-read\" onclick=\"readReminder("+x.id+")\">标记已读</span></div>";});l.innerHTML=h;}
    else{p.style.display="none";}
  }catch(e){}
}
async function readReminder(rid){await fetch("/reminders/"+rid+"/read",{method:"POST"});loadReminders();}

// ====== 我的面板 ======
async function loadMyPanel(){
  if(!student)return;
  try{
    var r1=await fetch("/my/profile/"+student.id);var p=await r1.json();
    var r2=await fetch("/my/schedule/"+student.id);var s=await r2.json();
    var m=p.mental;var h="";
    h+="<b>心理状态</b>: "+m.emotion+" (风险"+m.risk_score+")<br>";
    h+="<b>日程</b>: "+s.deadlines.length+"项待完成";
    if(s.deadlines.length>0){var d=s.deadlines[0];h+=" | 最近: "+d.title+" "+d.days_left+"天";}
    h+="<br><b>申请</b>: "+(s.applications.length>0?s.applications[0].current_step:"无");
    h+="<br><b>提醒</b>: "+s.reminders.length+"条未读";
    h+="<br><b>升学意向</b>: "+(p.upgrades.length>0?p.upgrades[0].interest_degree:"无");
    h+="<br><span style=\"color:#4f6ef7;cursor:pointer;font-size:11px\" onclick=\"loadMyDetail()\">展开详情</span>";
    document.getElementById("myList").innerHTML=h;
    document.getElementById("myPanel").style.display="block";
  }catch(e){}
}
async function loadMyDetail(){
  if(!student)return;
  var r1=await fetch("/my/profile/"+student.id);var p=await r1.json();
  var r2=await fetch("/my/tickets/"+student.id);var t=await r2.json();
  var r3=await fetch("/my/schedule/"+student.id);var s=await r3.json();
  var h="";
  h+="<b>心理状态</b><br>情绪: "+p.mental.emotion+" | 风险: "+p.mental.risk_score+"<br>";
  h+="<hr><b>日程DDL</b><br>";
  if(s.deadlines.length>0){s.deadlines.forEach(function(d){h+=d.event_type+": "+d.title+" | "+d.days_left+"天<br>";});}
  else{h+="暂无<br>";}
  h+="<hr><b>申请进度</b><br>";
  if(s.applications.length>0){s.applications.forEach(function(a){h+=a.program_name+" | "+a.current_step+"<br>";});}
  else{h+="暂无<br>";}
  h+="<hr><b>反馈工单</b><br>";
  if(t.tickets.length>0){t.tickets.forEach(function(x){h+=x.title+" ["+x.status+"]<br>";});}
  else{h+="暂无<br>";}
  h+="<hr><b>升学意向</b><br>";
  if(p.upgrades.length>0){p.upgrades.forEach(function(u){h+=u.interest_degree+" | "+u.conversion_status+"<br>";});}
  else{h+="暂无<br>";}
  h+="<span style=\"color:#4f6ef7;cursor:pointer;font-size:11px\" onclick=\"loadMyPanel()\">收起</span>";
  document.getElementById("myList").innerHTML=h;
}

// ====== 快捷入口 ======
document.getElementById("btnDDL").addEventListener("click",function(){quickSend("我最近有什么考试和论文DDL");});
document.getElementById("btnProgress").addEventListener("click",function(){quickSend("查一下我的留学申请进度");});
document.getElementById("btnUpgrade").addEventListener("click",function(){quickSend("我想了解升学深造的项目");});
function quickSend(msg){document.getElementById("userInput").value=msg;sendMsg();}

document.getElementById("sendBtn").addEventListener("click",sendMsg);
document.getElementById("userInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById("userInput").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});
async function sendMsg(){
  if(isBusy||!student)return;var input=document.getElementById("userInput");var msg=input.value.trim();if(!msg)return;
  isBusy=true;document.getElementById("sendBtn").disabled=true;input.value="";
  var emp=document.getElementById("emptyState");if(emp)emp.style.display="none";
  addMsg("user",msg);var tid=addTyping();
  try{
    var r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({student_id:student.id,message:msg,session_id:sessId})});
    var d=await r.json();sessId=d.session_id;document.getElementById("sessId").textContent=(sessId||"").substring(0,8)+"...";
    rmTyping(tid);addMsg("assistant",d.reply);updatePanel(d);
  }catch(e){rmTyping(tid);addMsg("assistant","抱歉，网络出了点问题，请重试");}
  isBusy=false;document.getElementById("sendBtn").disabled=false;input.focus();
}
function addMsg(role,text){var c=document.getElementById("chatBox");var d=document.createElement("div");d.className="message "+role;var av=role==="assistant"?"bot":"user";var em=role==="assistant"?"":" ";var t=new Date();var tm=t.getHours().toString().padStart(2,"0")+":"+t.getMinutes().toString().padStart(2,"0");d.innerHTML="<div class=\"avatar "+av+"\">"+em+"</div><div class=\"bubble "+role+"\">"+esc(text)+"<div class=\"time\">"+tm+"</div></div>";c.appendChild(d);c.scrollTop=c.scrollHeight;}
function addTyping(){var c=document.getElementById("chatBox");var d=document.createElement("div");d.className="message assistant";d.id="typ-"+Date.now();d.innerHTML="<div class=\"avatar bot\"></div><div class=\"bubble assistant\"><div class=\"typing-dots\"><span></span><span></span><span></span></div></div>";c.appendChild(d);c.scrollTop=c.scrollHeight;return d.id;}
function rmTyping(id){var e=document.getElementById(id);if(e)e.remove();}
function updatePanel(d){
  if(d.emotion&&d.emotion.emotion){var l=d.emotion.risk_level||"low";var cl=l==="high"||l==="critical"?"emotion-high":l==="medium"?"emotion-medium":"emotion-low";var cn={"正常":"","焦虑":"","低落":"","孤独":"","积极":"","适应困难":""};document.getElementById("emoPanel").innerHTML="<span class=\"emotion-tag "+cl+"\">"+d.emotion.emotion+"</span> <span style=\"font-size:11px;color:#999\">"+d.emotion.risk_score+"</span>";}
  if(d.intents&&d.intents.length>0){var nm={leave:"请假",mental:"心理",feedback:"投诉",academic:"学业",progress:"进度",life_guide:"生活",upgrade:"升学",nl2sql:"查询",chat:"闲聊"};document.getElementById("intPanel").innerHTML=d.intents.map(function(i){return"<span class=\"intent-tag\">"+(nm[i.intent]||i.intent)+"</span>";}).join("");}
}
function esc(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML;}
</script>
