<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学生信息录入 · 智能研判</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#4f6ef7;--primary-dark:#357abd;--primary-light:#6c8cff;
  --bg:#f5f7fa;--card:#fff;--border:#e8ecf1;--text:#1a1a2e;--text2:#666;--text3:#999;
  --success:#2ecc71;--warning:#f39c12;--danger:#e74c3c;--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── 顶部导航 ── */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:20px 0;text-align:center}
.header h1{font-size:22px;font-weight:600;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.85}

/* ── Tab 切换 ── */
.tab-bar{display:flex;background:#fff;border-bottom:2px solid var(--border);max-width:960px;margin:0 auto;padding:0}
.tab-bar .tab{flex:1;padding:16px 0;text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border-bottom:3px solid transparent;transition:all .2s}
.tab-bar .tab:hover{color:var(--primary);background:rgba(79,110,247,.03)}
.tab-bar .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-bar .tab .icon{margin-right:6px;font-size:15px}

/* ── 主体容器 ── */
.container{max-width:960px;margin:24px auto;padding:0 20px}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 16px rgba(0,0,0,.06);padding:32px;margin-bottom:20px}

/* ── 表单样式 ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:4px}
.form-group{margin-bottom:16px}
.form-group.full{grid-column:1/-1}
label{display:block;font-size:14px;color:#333;margin-bottom:6px;font-weight:500}
label .req{color:var(--danger)}
label .opt{color:var(--text3);font-weight:400;font-size:12px}
input,select,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:#333;transition:border-color .2s;outline:none;background:#fafbfc}
input:focus,select:focus,textarea:focus{border-color:var(--primary);background:#fff}
textarea{resize:vertical;min-height:70px}
.divider{height:1px;background:#eee;margin:24px 0 16px}
.section-title{font-size:13px;color:var(--text3);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}

/* ── 按钮 ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 4px 16px rgba(79,110,247,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,110,247,.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:#f2f3f5;color:var(--text2);font-weight:500;font-size:13px;padding:8px 18px;border-radius:8px}
.btn-ghost:hover{background:#e4e6ea}

/* ── 聊天区域 ── */
.chat-box{height:380px;overflow-y:auto;padding:16px;background:#fafbfc;border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
.chat-box::-webkit-scrollbar{width:5px}
.chat-box::-webkit-scrollbar-thumb{background:#ddd;border-radius:10px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.avatar.bot{background:linear-gradient(135deg,#eef2ff,#dde4ff)}
.avatar.user{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.bubble.bot{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04);border-bottom-left-radius:6px}
.bubble.user{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-bottom-right-radius:6px}
.typing-dots{display:flex;gap:4px;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#bcc4d6;animation:typing 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.chat-input{display:flex;gap:10px;align-items:flex-end}
.chat-input textarea{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:14px;resize:none;outline:none;min-height:44px;max-height:110px;font-family:inherit;background:#fafbfc;transition:all .2s}
.chat-input textarea:focus{border-color:var(--primary);background:#fff}
.chat-input .send-btn,.chat-input .mic-btn{width:44px;height:44px;border:none;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0}
.chat-input .send-btn{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:16px}
.chat-input .send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,110,247,.3)}
.chat-input .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.chat-input .mic-btn{background:#f2f3f5;color:var(--text2)}
.chat-input .mic-btn:hover{background:#dde4ff;color:var(--primary)}
.chat-input .mic-btn.recording{background:var(--danger);color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 8px rgba(231,76,60,0)}}

/* ── 简历上传 ── */
.upload-zone{border:2.5px dashed #c8d4ff;border-radius:var(--radius);padding:48px 20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(79,110,247,.02)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:rgba(79,110,247,.05);transform:scale(1.01)}
.upload-zone .icon{font-size:48px;margin-bottom:12px;opacity:.7}
.upload-zone .title{font-size:15px;color:var(--text);font-weight:500;margin-bottom:6px}
.upload-zone .hint{font-size:13px;color:var(--text3)}
.upload-zone input[type=file]{display:none}
.upload-preview{display:none;margin-top:16px;padding:14px 18px;background:#f8f9fc;border-radius:10px;font-size:13px;color:var(--text2);border:1px solid var(--border)}
.upload-preview.show{display:flex;align-items:center;gap:12px;justify-content:space-between}
.upload-preview .file-info{display:flex;align-items:center;gap:10px}
.upload-preview .file-icon{font-size:28px}
.upload-preview .file-name{font-weight:500;color:var(--text)}

/* ── 结果卡片 ── */
.result-card{display:none;margin-top:20px;padding:24px;background:linear-gradient(135deg,#f8f9fc,#f0f4ff);border:1px solid #dde4ff;border-radius:var(--radius);animation:fadeIn .4s ease}
.result-card.show{display:block}
.result-card h3{font-size:16px;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.result-card .summary{font-size:14px;line-height:1.8;color:#444;margin-bottom:16px}
.result-card .rec-list{display:flex;flex-direction:column;gap:10px}
.result-card .rec-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-radius:10px;border:1px solid var(--border)}
.result-card .rec-item .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;flex-shrink:0}
.result-card .rec-item .badge.pass{background:#eaf7ea;color:#2d8a2d}
.result-card .rec-item .rec-info{flex:1}
.result-card .rec-item .rec-name{font-size:14px;font-weight:600;color:var(--text)}
.result-card .rec-item .rec-country{font-size:12px;color:var(--text3);margin-top:2px}
.result-card .rec-item .rec-score{font-size:18px;font-weight:700;color:var(--primary)}
.result-card .field-summary{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.result-card .field-tag{padding:4px 10px;background:#eef2ff;border-radius:6px;font-size:12px;color:var(--primary)}

/* ── 状态消息 ── */
.status-msg{margin-top:14px;padding:10px 16px;border-radius:8px;font-size:13px;display:none}
.status-msg.show{display:block}
.status-msg.error{background:#fde8e8;color:#c0392b;border:1px solid #f5c6cb}
.status-msg.success{background:#eaf7ea,color:#2d8a2d;border:1px solid #c3e6cb}
.status-msg.loading{background:#eef2ff;color:var(--primary);border:1px solid #c8d4ff}

/* ── 响应式 ── */
@media(max-width:640px){
  .form-row{grid-template-columns:1fr}
  .container{padding:0 12px}
  .card{padding:20px 16px}
}
</style>
</head>
<body>

<div class="header">
  <h1>学生信息录入 · 智能研判</h1>
  <p class="sub">填写个人信息后，系统将自动分析并推荐适合的留学项目</p>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="form" onclick="switchTab('form')">
    <span class="icon">&#9998;</span>表单录入
  </div>
  <div class="tab" data-tab="chat" onclick="switchTab('chat')">
    <span class="icon">&#128172;</span>智能对话
  </div>
  <div class="tab" data-tab="resume" onclick="switchTab('resume')">
    <span class="icon">&#128196;</span>简历上传
  </div>
</div>

<div class="container">

  <!-- ========== Tab 1: 表单录入 ========== -->
  <div class="panel active" id="panel-form">
    <div class="card">
      <h2 style="font-size:18px;margin-bottom:6px">基本信息</h2>
      <p style="font-size:13px;color:var(--text3);margin-bottom:20px">请填写以下信息，提交后将自动触发智能研判</p>
      <form id="resumeForm">
        <div class="form-row">
          <div class="form-group"><label>姓名 <span class="req">*</span></label><input type="text" id="name" placeholder="请输入姓名" required></div>
          <div class="form-group"><label>年龄 <span class="req">*</span></label><input type="number" id="age" placeholder="请输入年龄" min="10" max="100" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>当前专业 <span class="req">*</span></label><input type="text" id="major" placeholder="如：车辆工程" required></div>
          <div class="form-group"><label>当前学历 <span class="req">*</span></label>
            <select id="education" required>
              <option value="">请选择</option><option value="高中">高中</option><option value="本科">本科</option>
              <option value="硕士">硕士</option><option value="博士">博士</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>目标申请专业 <span class="req">*</span></label><input type="text" id="target_major" placeholder="如：人工智能" required></div>
          <div class="form-group"><label>语言成绩 <span class="req">*</span></label><input type="text" id="language_score" placeholder="如：雅思 7.0 / 托福 100" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>目标留学国家 <span class="req">*</span></label><input type="text" id="target_country" placeholder="如：德国" required></div>
          <div class="form-group"><label>GPA <span class="req">*</span></label><input type="number" id="gpa" placeholder="如：3.5" step="0.01" min="0" max="4" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>留学预算（元）<span class="req">*</span></label><input type="number" id="budget" placeholder="如：200000" min="0" required></div>
          <div class="form-group"><label>手机号码 <span class="req">*</span></label><input type="text" id="phone" placeholder="请输入手机号" required></div>
        </div>
        <div class="form-group full"><label>发展需求 <span class="req">*</span></label><textarea id="development" placeholder="请描述学生的职业发展需求和规划..." required></textarea></div>
        <div class="form-group full"><label>综合能力 <span class="req">*</span></label><textarea id="abilities" placeholder="请描述学生的综合能力，如专业技能、项目经验等..." required></textarea></div>
        <div class="form-row"><div class="form-group"><label>封闭式实训 <span class="req">*</span></label>
          <select id="closed_loop" required><option value="">请选择</option><option value="是">是</option><option value="否">否</option></select>
        </div></div>
        <div class="divider"></div>
        <div class="section-title">选填信息</div>
        <div class="form-row">
          <div class="form-group"><label>微信号 <span class="opt">选填</span></label><input type="text" id="wechat" placeholder="请输入微信号"></div>
          <div class="form-group"><label>电子邮箱 <span class="opt">选填</span></label><input type="email" id="email" placeholder="请输入邮箱"></div>
        </div>
        <button type="submit" class="btn btn-primary" id="formSubmitBtn" style="width:100%;margin-top:12px">提交并研判</button>
      </form>
      <div class="status-msg" id="formStatus"></div>
    </div>
    <!-- 表单结果卡片 -->
    <div class="result-card" id="formResult"></div>
  </div>

  <!-- ========== Tab 2: 智能对话 ========== -->
  <div class="panel" id="panel-chat">
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">&#129302;</span>
        <div><div style="font-weight:600;font-size:15px">智能录入助手</div><div style="font-size:12px;color:var(--text3)">告诉我你的信息，我来帮你分析</div></div>
      </div>
      <div class="chat-box" id="chatBox">
        <div class="msg bot" id="chatWelcome">
          <div class="avatar bot">&#129302;</div>
          <div class="bubble bot">你好！我是智能录入助手。请告诉我你的留学相关信息，比如：<br>&#8226; 姓名、年龄、专业<br>&#8226; 目标国家和专业<br>&#8226; GPA、语言成绩<br>&#8226; 预算等<br>我会自动提取信息并进行项目推荐分析。</div>
        </div>
      </div>
      <div style="padding:14px 20px;border-top:1px solid var(--border)">
        <div class="chat-input">
          <button class="mic-btn" id="micBtn" title="语音输入">&#127908;</button>
          <textarea id="chatInput" placeholder="输入你的信息，按 Enter 发送..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" title="发送">&#10148;</button>
        </div>
      </div>
    </div>
    <!-- 对话结果卡片 -->
    <div class="result-card" id="chatResult"></div>
  </div>

  <!-- ========== Tab 3: 简历上传 ========== -->
  <div class="panel" id="panel-resume">
    <div class="card">
      <h2 style="font-size:18px;margin-bottom:6px">简历上传</h2>
      <p style="font-size:13px;color:var(--text3);margin-bottom:20px">上传简历文件，系统将自动提取信息并研判</p>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" onchange="handleFileSelect(event)">
        <div class="icon">&#128194;</div>
        <div class="title">点击或拖拽文件到此处</div>
        <div class="hint">支持 PDF / DOCX / TXT / MD，最大 10MB</div>
      </div>
      <div class="upload-preview" id="uploadPreview">
        <div class="file-info"><span class="file-icon" id="previewIcon">&#128196;</span><span class="file-name" id="previewName"></span></div>
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadResume()">上传并研判</button>
        <button class="btn btn-ghost" onclick="clearFile()">取消</button>
      </div>
      <div class="status-msg" id="resumeStatus"></div>
    </div>
    <!-- 简历结果卡片 -->
    <div class="result-card" id="resumeResult"></div>
  </div>

</div>

<script>
// ========== Tab 切换 ==========
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

// ========== 工具 ==========
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function showStatus(el,type,text){
  el.className='status-msg show '+type;
  el.innerHTML=text;
}
function hideStatus(el){el.className='status-msg';}

function renderResult(cardEl, data){
  if(!data){cardEl.classList.remove('show');return}
  var recs=(data.recommendations||[]);
  var html='<h3>&#128200; 研判结果</h3>';
  html+='<div class="summary">'+esc(data.assessment_text||data.assessmentText||'')+'</div>';
  if(recs.length>0){
    html+='<div style="font-weight:600;margin-bottom:10px;font-size:14px">推荐项目：</div>';
    html+='<div class="rec-list">';
    recs.forEach(function(r){
      html+='<div class="rec-item"><span class="badge pass">&#10004; 通过</span>'+
        '<div class="rec-info"><div class="rec-name">'+esc(r.project_name||('项目'+r.project_id))+'</div>'+
        '</div><span class="rec-score">'+r.score+'分</span></div>';
    });
    html+='</div>';
  }
  if(data.extracted_fields){
    var flds=data.extracted_fields;
    html+='<div style="font-weight:600;margin:14px 0 8px;font-size:13px">提取到的信息：</div>';
    html+='<div class="field-summary">';
    var labelMap={name:'姓名',age:'年龄',major:'专业',education:'学历',target_major:'目标专业',
      language_score:'语言',target_country:'国家',gpa:'GPA',budget:'预算',phone:'手机',
      development:'发展需求',abilities:'综合能力',closed_loop:'封闭式实训',wechat:'微信',email:'邮箱'};
    Object.keys(flds).forEach(function(k){
      if(flds[k]!==null&&flds[k]!==undefined){
        html+='<span class="field-tag">'+(labelMap[k]||k)+': '+esc(String(flds[k]))+'</span>';
      }
    });
    html+='</div>';
  }
  cardEl.innerHTML=html;
  cardEl.classList.add('show');
}

// ========== Tab 1: 表单提交 ==========
document.getElementById('resumeForm').addEventListener('submit',async function(e){
  e.preventDefault();
  var btn=document.getElementById('formSubmitBtn');
  var status=document.getElementById('formStatus');
  var resultCard=document.getElementById('formResult');
  btn.disabled=true;
  showStatus(status,'loading','正在提交并研判，请稍候...');
  resultCard.classList.remove('show');

  var formData={
    name:document.getElementById('name').value,
    age:parseInt(document.getElementById('age').value),
    major:document.getElementById('major').value,
    education:document.getElementById('education').value,
    target_major:document.getElementById('target_major').value,
    language_score:document.getElementById('language_score').value,
    target_country:document.getElementById('target_country').value,
    gpa:parseFloat(document.getElementById('gpa').value),
    budget:parseFloat(document.getElementById('budget').value),
    phone:document.getElementById('phone').value,
    development:document.getElementById('development').value,
    abilities:document.getElementById('abilities').value,
    closed_loop:document.getElementById('closed_loop').value,
    wechat:document.getElementById('wechat').value||null,
    email:document.getElementById('email').value||null
  };

  try{
    var r=await fetch('/api/agent/intake/form',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formData)
    });
    var d=await r.json();
    if(d.code===0){
      showStatus(status,'success','提交成功！研判完成。');
      renderResult(resultCard,d.data);
    }else if(d.code===409){
      showStatus(status,'error','该用户已研判过，无需重复操作。');
    }else{
      showStatus(status,'error',d.data||d.msg||'研判失败，请重试');
    }
  }catch(err){
    showStatus(status,'error','网络错误：'+err.message);
  }
  btn.disabled=false;
});

// ========== Tab 2: 智能对话 ==========
var chatBox=document.getElementById('chatBox');
var chatInput=document.getElementById('chatInput');
var chatResult=document.getElementById('chatResult');
var partialProfile={};  // 浏览器端保存部分提取的字段
var isBusy=false;

document.getElementById('sendBtn').addEventListener('click',sendMsg);
chatInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
chatInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';});

function addMsg(role,text){
  var id='m'+Date.now()+Math.random();
  var div=document.createElement('div');
  div.className='msg '+role;div.id=id;
  var av=role==='user'?'user':'bot';
  var e=role==='user'?'':'';
  div.innerHTML='<div class="avatar '+av+'">'+e+'</div><div class="bubble '+role+'">'+esc(text)+'</div>';
  chatBox.appendChild(div);chatBox.scrollTop=chatBox.scrollHeight;
  return id;
}
function addTyping(){
  var id='t'+Date.now();
  var div=document.createElement('div');div.className='message bot';div.id=id;
  div.innerHTML='<div class="avatar bot"></div><div class="bubble bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  chatBox.appendChild(div);chatBox.scrollTop=chatBox.scrollHeight;
  return id;
}
function rmTyping(id){var e=document.getElementById(id);if(e)e.remove();}

async function sendMsg(){
  if(isBusy)return;
  var text=chatInput.value.trim();
  if(!text&&Object.keys(partialProfile).length===0)return;
  isBusy=true;
  document.getElementById('sendBtn').disabled=true;
  chatInput.value='';chatInput.style.height='auto';
  addMsg('user',text||'[补充信息]');
  var tid=addTyping();
  chatResult.classList.remove('show');
  try{
    var r=await fetch('/api/agent/intake/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text})
    });
    var d=await r.json();
    rmTyping(tid);
    if(d.code===1){
      // 需要更多信息
      partialProfile=Object.assign({},d.data.partial_profile,partialProfile);
      addMsg('bot',d.data.ask+'（请直接在下方补充）');
    }else if(d.code===0){
      partialProfile={};
      addMsg('bot','信息已收集完毕，研判完成！');
      renderResult(chatResult,d.data);
    }else if(d.code===409){
      addMsg('bot',d.data||'该用户已研判过，无需重复操作。');
    }else{
      addMsg('bot','抱歉，处理失败：'+(d.data||d.msg||'未知错误'));
    }
  }catch(err){
    rmTyping(tid);
    addMsg('bot','网络错误：'+err.message);
  }
  isBusy=false;
  document.getElementById('sendBtn').disabled=false;
  chatInput.focus();
}

// ========== 语音输入 (Web Speech API) ==========
var micBtn=document.getElementById('micBtn');
var recognition=null;
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='zh-CN';
  recognition.continuous=false;
  recognition.interimResults=false;
  recognition.onresult=function(e){
    var txt=e.results[0][0].transcript;
    chatInput.value=(chatInput.value?chatInput.value+' ':'')+txt;
    chatInput.style.height='auto';chatInput.style.height=Math.min(chatInput.scrollHeight,110)+'px';
  };
  recognition.onend=function(){micBtn.classList.remove('recording');};
  recognition.onerror=function(e){micBtn.classList.remove('recording');console.warn('语音识别错误',e.error);};
  micBtn.addEventListener('click',function(){
    if(micBtn.classList.contains('recording')){
      recognition.stop();micBtn.classList.remove('recording');
    }else{
      try{recognition.start();micBtn.classList.add('recording');}catch(e){console.warn(e);}
    }
  });
}else{
  micBtn.style.display='none';
}

// ========== Tab 3: 简历上传 ==========
var selectedFile=null;
var uploadZone=document.getElementById('uploadZone');

uploadZone.addEventListener('dragover',function(e){e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave',function(){uploadZone.classList.remove('dragover');});
uploadZone.addEventListener('drop',function(e){
  e.preventDefault();uploadZone.classList.remove('dragover');
  if(e.dataTransfer.files.length>0){
    document.getElementById('fileInput').files=e.dataTransfer.files;
    handleFileSelect({target:{files:e.dataTransfer.files}});
  }
});

function handleFileSelect(e){
  var f=e.target.files[0];if(!f)return;
  selectedFile=f;
  document.getElementById('previewName').textContent=f.name+' ('+Math.round(f.size/1024)+' KB)';
  document.getElementById('uploadPreview').classList.add('show');
}
function clearFile(){
  selectedFile=null;
  document.getElementById('fileInput').value='';
  document.getElementById('uploadPreview').classList.remove('show');
  document.getElementById('resumeResult').classList.remove('show');
  hideStatus(document.getElementById('resumeStatus'));
}

async function uploadResume(){
  if(!selectedFile)return;
  var status=document.getElementById('resumeStatus');
  var btn=document.getElementById('uploadBtn');
  btn.disabled=true;
  showStatus(status,'loading','正在解析简历并研判，请稍候...');
  document.getElementById('resumeResult').classList.remove('show');
  var fd=new FormData();
  fd.append('file',selectedFile);
  try{
    var r=await fetch('/api/agent/intake/resume',{method:'POST',body:fd});
    var d=await r.json();
    if(d.code===0){
      showStatus(status,'success','简历解析成功！研判完成。');
      renderResult(document.getElementById('resumeResult'),d.data);
    }else{
      showStatus(status,'error',d.data||d.msg||'处理失败，请重试');
    }
  }catch(err){
    showStatus(status,'error','网络错误：'+err.message);
  }
  btn.disabled=false;
}
</script>
