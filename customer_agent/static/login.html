<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 粤教留学客服Agent</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-brand">
      <div class="logo">🎓</div>
      <strong>粤教留学</strong>
      <small>客服Agent工作台</small>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名"
               required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码"
               required autocomplete="current-password" />
      </div>
      <p class="login-error" id="loginError" style="display:none"></p>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        登录
      </button>
    </form>

    <p class="login-hint">
      粤教留学客服系统 · v1.0<br/>
      账号由管理员分配
    </p>
  </div>

  <div id="toastContainer"></div>

  <script src="js/utils.js"></script>
  <script>
    // 已登录 → 直接跳转
    if (localStorage.getItem('customer_token')) {
      location.replace('dashboard.html');
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) {
        errEl.textContent = '请输入用户名和密码';
        errEl.style.display = '';
        return;
      }
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await resp.json();
        if (data.success) {
          var s = data.student;
          localStorage.setItem('customer_token', 'token-' + Date.now());
          localStorage.setItem('customer_user', JSON.stringify({
            name: s.name, id: s.user_id, role: s.user_type || '员工'
          }));
          toast('登录成功！即将进入工作台...', 'success');
          setTimeout(() => location.replace('dashboard.html'), 600);
        } else {
          errEl.textContent = data.message || '用户名或密码不正确';
          errEl.style.display = '';
          toast(data.message || '用户名或密码不正确', 'error');
        }
      } catch (err) {
        errEl.textContent = '无法连接服务，请检查网络';
        errEl.style.display = '';
        toast('登录失败：' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
