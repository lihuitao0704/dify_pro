app:
  description: 7大场景：请假/心理/投诉/DDL/进度/海外/增值
  icon: 🎓
  icon_background: '#E0F2FE'
  icon_type: emoji
  mode: advanced-chat
  name: 🎓 学生智能助手
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/tongyi:0.2.3@966063fe991c50e5ac82106e65fc1949f852b2989ab2433ac028f0d25c6f92b1
    version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables:
  - name: FASTAPI_BASE_URL
    value_type: string
    value: http://localhost:8000
    description: FastAPI 学生服务地址。Docker部署用 http://host.docker.internal:8000
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - remote_url
      - local_file
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: '👋 你好！我是你的专属学习助手。可以帮你：

      📝 请假申请  🧠 情绪关怀  📣 投诉建议

      📚 学业DDL查询  📈 申请进度  🌏 海外生活  🎓 增值项目'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 我想请假3天
    - 最近压力很大心情不好
    - 我的论文DDL是什么时候
    - 我的留学申请到哪一步了
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    nodes:
    - id: '1000000000001'
      type: custom
      position:
        x: 80
        y: 160
      positionAbsolute:
        x: 80
        y: 160
      selected: false
      sourcePosition: right
      targetPosition: left
      height: 72
      width: 241
      data:
        type: start
        title: 开始
        selected: false
        variables:
        - variable: student_id
          label: 学生ID
          type: number
          required: true
    - id: '1000000000002'
      type: custom
      position:
        x: 280
        y: 160
      positionAbsolute:
        x: 280
        y: 160
      selected: false
      sourcePosition: right
      targetPosition: left
      height: 110
      width: 241
      data:
        type: http-request
        title: 创建会话
        selected: false
        method: post
        url: '{{FASTAPI_BASE_URL}}/api/v1/dify/tools/init-session'
        authorization:
          type: no-auth
        headers: 'Content-Type: application/json'
        params: []
        body:
          type: json
          data: '{"student_id": {{start.student_id}}, "agent_type": "student"}'
        timeout:
          connect: 10
          read: 60
          write: 30
          max_connect_timeout: 0
          max_read_timeout: 0
        retry_config:
          max_retries: 0
          retry_interval: 0
          retry_enabled: false
        ssl_verify: true
    - id: '1000000000003'
      type: custom
      position:
        x: 480
        y: 160
      positionAbsolute:
        x: 480
        y: 160
      selected: false
      sourcePosition: right
      targetPosition: left
      height: 180
      width: 241
      data:
        type: code
        title: 解析session_id
        selected: false
        code_language: python3
        code: "import json\ndef main(init_session_body: str) -> dict:\n    data = json.loads(init_session_body or \"{}\")\n    return {\"session_id\": data.get(\"session_id\", 0)}"
        variables:
        - variable: init_session_body
          value_selector:
          - '1000000000002'
          - body
        outputs:
        - name: session_id
          type: number
    - id: '1000000000004'
      type: custom
      position:
        x: 680
        y: 80
      positionAbsolute:
        x: 680
        y: 80
      selected: false
      sourcePosition: right
      targetPosition: left
      height: 240
      width: 241
      data:
