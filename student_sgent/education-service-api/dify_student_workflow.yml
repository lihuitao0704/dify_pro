          name: qwen3.7-max
          mode: chat
          completion_params:
            temperature: 0.7
        prompt_template:
        - id: 7737950b-385e-47d5-93a8-17deaeee4465
          role: system
          text: '你是一个学生助手意图分类器。根据用户输入，只输出意图代码：

            leave_request — 请假

            emotion_chat — 情绪关怀

            feedback_submit — 投诉建议

            academic_query — 学业查询(DDL/论文/考试)

            progress_query — 申请进度

            overseas_life — 海外生活

            upselling — 增值转化


            只输出意图代码，不要输出其他内容。'
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}'
          role_prefix:
            user: 学生
            assistant: 助手
